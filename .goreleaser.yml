version: 2

before:
  hooks:
    - go mod tidy -diff
    - "sed -i.bak -e 's/\"version\": \".*\"/\"version\": \"{{ .Version }}\"/' -e 's#/releases/download/v[^/]*/#/releases/download/v{{ .Version }}/#g' -e 's#workflow-plugin-auth_[^_]*_#workflow-plugin-auth_{{ .Version }}_#g' plugin.json && rm -f plugin.json.bak"
    - "sh -c 'PLUGIN_MANIFEST_EXPECT_VERSION={{ .Version }} go test ./internal -run TestIntegration_PluginManifestAndStepTypes -count=1'"

builds:
  - id: workflow-plugin-auth
    main: ./cmd/{{ .ProjectName }}
    binary: "{{ .ProjectName }}"
    env:
      - CGO_ENABLED=0
      - GOPRIVATE=github.com/GoCodeAlone/*
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w -X main.version={{.Version}} -X github.com/GoCodeAlone/workflow-plugin-auth/internal.Version={{.Version}}

archives:
  - formats: [tar.gz]
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    files:
      - plugin.json
      - plugin.contracts.json
      - LICENSE

checksum:
  name_template: "checksums.txt"

release:
  draft: true
  github:
    owner: GoCodeAlone
    name: workflow-plugin-auth
