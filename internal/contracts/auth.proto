// --- Bootstrap redeem (step.auth_bootstrap_redeem) ---
message BootstrapRedeemConfig {
  string super_admin_email = 1;
  string super_admin_role  = 2;   // output label; default "super_admin" applied in Go
  string code_env          = 3;   // env var NAME; default "AUTH_BOOTSTRAP_CODE" applied in Go
}
message BootstrapRedeemInput {
  string code                 = 1;
  // existing_admin_count is declared here as a string for the typed contract, but the
  // step reads it from the dynamic pipeline `current` context either way: it is usually
  // supplied via db_query/step.set (emitted as a JSON number or string) and coerced to a
  // non-negative int in Go (int/int64/float64/numeric-string all accepted).
  string existing_admin_count = 2;
}
message BootstrapRedeemOutput {
  bool   redeemed = 1;
  string email    = 2;
  string role     = 3;
  string reason    = 4;  // "" | "bootstrap_closed" | "invalid_code" | "not_configured"
  string error    = 100;
}

// --- JWT issue (step.auth_jwt_issue) ---
message JWTIssueConfig {
  string secret_env  = 1;  // env var NAME; default "AUTH_JWT_SECRET"
  string issuer      = 2;  // default "workflow-plugin-auth"
  int64  ttl_seconds = 3;  // default 3600
}
message JWTIssueInput {
  string                  subject = 1;
  google.protobuf.Struct  claims  = 2;
}
message JWTIssueOutput {
  string token      = 1;
  string expires_at = 2;  // RFC3339
  string error      = 100;
}

// --- Anthropic 2-step OAuth exchange (step.auth_anthropic_exchange) ---
// DISTINCT from the generic auth_oauth_exchange (google/facebook). This step
// implements Anthropic's bespoke 2-step OAuth: code -> access_token at
// console.anthropic.com, then access_token -> permanent API key at
// api.anthropic.com. The PKCE `state` parameter is reused as the
// `code_verifier`. Gated by enable_anthropic_oauth (default false): the step
// mints long-lived Anthropic API keys, so only opt-in consumers (ratchet)
// enable it (D17 confused-deputy guard).
message AnthropicExchangeConfig {
  // enable_anthropic_oauth MUST be explicitly true for the step to perform the
  // exchange. Default false: the step returns a disabled result and performs
  // NO HTTP. Opt-in only.
  bool enable_anthropic_oauth = 1;
}

message AnthropicExchangeInput {
  string code          = 1;  // authorization code from the SPA redirect
  string redirect_uri  = 2;  // runtime SPA redirect_uri (NOT config)
  // code_verifier is the PKCE verifier. Anthropic reuses the OAuth `state`
  // parameter as the code_verifier; either field is accepted as the verifier.
  string code_verifier = 3;
  string state         = 4;  // alias for code_verifier (PKCE quirk)
}

message AnthropicExchangeOutput {
  bool   success      = 1;
  string api_key      = 2;   // permanent raw_key from create_api_key
  string access_token = 3;   // ephemeral token from step 1 (debug only)
  string error        = 100;
}
