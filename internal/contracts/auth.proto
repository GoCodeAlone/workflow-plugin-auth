syntax = "proto3";

package workflow.plugins.auth.v1;

option go_package = "github.com/GoCodeAlone/workflow-plugin-auth/internal/contracts";

import "google/protobuf/struct.proto";

message CredentialModuleConfig {
  string rp_display_name = 1;
  string rp_id = 2;
  string origin = 3;
  bool optional = 4;
}

message PasskeyStepConfig {
  string module = 1;
}

message PasskeyBeginRegisterInput {
  string user_id = 1;
  string email = 2;
  string display_name = 3;
}

message PasskeyBeginRegisterOutput {
  string options = 1;
  string session_data = 3;
  string error = 100;
}

message PasskeyFinishRegisterInput {
  string user_id = 1;
  string email = 2;
  string display_name = 3;
  string attestation = 4;
  string session_data = 5;
}

message PasskeyFinishRegisterOutput {
  bool valid = 1;
  string credential_id = 2;
  string public_key = 3;
  string aaguid = 4;
  uint32 sign_count = 5;
  string credential = 6;
  string error = 100;
}

message PasskeyBeginLoginInput {
  string user_id = 1;
  string credentials = 2;
}

message PasskeyBeginLoginOutput {
  string options = 1;
  string session_data = 3;
  string error = 100;
}

message PasskeyFinishLoginInput {
  string user_id = 1;
  string email = 2;
  string session_data = 3;
  string credentials = 4;
  string assertion = 5;
}

message PasskeyFinishLoginOutput {
  bool valid = 1;
  string credential_id = 2;
  uint32 sign_count = 3;
  string error = 100;
}

message EmptyConfig {}

message TOTPGenerateSecretInput {
  string email = 1;
  string issuer = 2;
}

message TOTPGenerateSecretOutput {
  string secret = 1;
  string provisioning_uri = 2;
  string issuer = 3;
  string account = 4;
  string error = 100;
}

message TOTPVerifyInput {
  string secret = 1;
  string code = 2;
}

message TOTPVerifyOutput {
  bool valid = 1;
  string error = 100;
}

message TOTPRecoveryCodesInput {
  int32 count = 1;
}

message TOTPRecoveryCodesOutput {
  repeated string codes = 1;
  repeated string hashes = 2;
  string error = 100;
}

message MagicLinkGenerateInput {
  string email = 1;
  string signing_secret = 2;
}

message MagicLinkGenerateOutput {
  string token = 1;
  string token_hash = 2;
  string signature = 3;
  string email = 4;
  string expires_at = 5;
  string error = 100;
}

message MagicLinkVerifyInput {
  string token = 1;
  string stored_hash = 2;
  string expires_at = 3;
}

message MagicLinkVerifyOutput {
  bool valid = 1;
  string error = 100;
}

message MagicLinkSendConfig {
  string smtp_host = 1;
  int32 smtp_port = 2;
  string smtp_user = 3;
  string smtp_pass = 4;
  string from_address = 5;
}

message MagicLinkSendInput {
  string to = 1;
  string magic_link_url = 2;
}

message MagicLinkSendOutput {
  bool sent = 1;
  bool dev_mode = 2;
  string magic_link_url = 3;
  string to = 4;
  string error = 100;
}

message PasswordHashInput {
  string password = 1;
}

message PasswordHashOutput {
  string hash = 1;
  string error = 100;
}

message PasswordVerifyInput {
  string password = 1;
  string hash = 2;
}

message PasswordVerifyOutput {
  bool valid = 1;
  string error = 100;
}

message ChallengeGenerateInput {
  string channel = 1;
  string destination = 2;
  string tenant_id = 3;
  string purpose = 4;
  string signing_secret = 5;
  int32 ttl_minutes = 6;
}

message ChallengeGenerateOutput {
  string code = 1;
  string code_hash = 2;
  string channel = 3;
  string destination = 4;
  string expires_at = 5;
  string error = 100;
}

message ChallengeVerifyInput {
  string channel = 1;
  string code = 2;
  string code_hash = 3;
  string destination = 4;
  string tenant_id = 5;
  string purpose = 6;
  string signing_secret = 7;
  int32 attempts = 8;
  int32 max_attempts = 9;
  string expires_at = 10;
}

message ChallengeVerifyOutput {
  bool valid = 1;
  string error = 100;
}

message NormalizePhoneInput {
  string phone = 1;
}

message NormalizePhoneOutput {
  bool valid = 1;
  string phone_e164 = 2;
  string country = 3;
  string phone = 4;
  bool phone_valid = 5;
  string error = 100;
}

message AuthMethodsPolicyConfig {
  string environment = 1;
  optional bool password_auth_enabled = 2;
  optional bool password_enabled = 3;
  optional bool totp_auth_enabled = 4;
  optional bool totp_enabled = 5;
  string webauthn_rp_id = 6;
  string webauthn_origin = 7;
  string smtp_host = 8;
  string smtp_from = 9;
  optional bool auth_routes_enabled = 10;
  optional bool routes_enabled = 11;
  optional bool oauth_routes_enabled = 12;
  string google_oauth_client_id = 13;
  string google_oauth_client_secret = 14;
  string google_oauth_redirect_url = 15;
  string oauth_provider = 16;
  optional bool sms_enabled = 17;
  string twilio_verify_service_sid = 18;
  string twilio_account_sid = 19;
  string twilio_auth_token = 20;
  string twilio_api_key_sid = 21;
  string twilio_api_key_secret = 22;
  int32 password_hash_count = 23;
  string jwt_secret = 24;
  optional bool sms_auth_enabled = 25;
  string facebook_oauth_client_id = 26;
  string facebook_oauth_client_secret = 27;
  string instagram_oauth_client_id = 28;
  string instagram_oauth_client_secret = 29;
  string x_oauth_client_id = 30;
  string x_oauth_client_secret = 31;
}

message AuthMethodsPolicyInput {
  string environment = 1;
  optional bool password_auth_enabled = 2;
  optional bool password_enabled = 3;
  optional bool totp_auth_enabled = 4;
  optional bool totp_enabled = 5;
  string webauthn_rp_id = 6;
  string webauthn_origin = 7;
  string smtp_host = 8;
  string smtp_from = 9;
  optional bool auth_routes_enabled = 10;
  optional bool routes_enabled = 11;
  optional bool oauth_routes_enabled = 12;
  string google_oauth_client_id = 13;
  string google_oauth_client_secret = 14;
  string google_oauth_redirect_url = 15;
  string oauth_provider = 16;
  optional bool sms_enabled = 17;
  string twilio_verify_service_sid = 18;
  string twilio_account_sid = 19;
  string twilio_auth_token = 20;
  string twilio_api_key_sid = 21;
  string twilio_api_key_secret = 22;
  int32 password_hash_count = 23;
  string jwt_secret = 24;
  optional bool sms_auth_enabled = 25;
  string facebook_oauth_client_id = 26;
  string facebook_oauth_client_secret = 27;
  string instagram_oauth_client_id = 28;
  string instagram_oauth_client_secret = 29;
  string x_oauth_client_id = 30;
  string x_oauth_client_secret = 31;
}

message AuthMethodsPolicyOutput {
  bool passkey_enabled = 1;
  bool email_code_enabled = 2;
  bool sms_code_enabled = 3;
  bool password_enabled = 4;
  bool password_auth_enabled = 5;
  bool totp_enabled = 6;
  repeated string oauth_providers = 7;
  int32 primary_method_count = 8;
  string error = 100;
}

message AuthPolicyGateConfig {
  string policy_step = 1;
  string signing_secret = 2;
  string jwt_secret = 3;
  repeated string required_runtime_keys = 4;
  repeated string oauth_supported_providers = 5;
  string tenant_id = 6;
}

message AuthChallengeVerifyConfig {
  string signing_secret = 1;
}

message AuthChallengeGenerateConfig {
  string signing_secret = 1;
  int32 ttl_minutes = 2;
}

message AuthPolicyGateInput {
  bool passkey_enabled = 1;
  bool email_code_enabled = 2;
  bool sms_code_enabled = 3;
  bool password_enabled = 4;
  bool password_auth_enabled = 5;
  bool totp_enabled = 6;
  repeated string oauth_providers = 7;
  int32 primary_method_count = 8;
  string signing_secret = 9;
  string jwt_secret = 10;
}

message AuthMethodsResponseOutput {
  bool passkey_enabled = 1;
  bool email_code_enabled = 2;
  bool sms_code_enabled = 3;
  bool password_enabled = 4;
  bool password_auth_enabled = 5;
  bool totp_enabled = 6;
  repeated string oauth_providers = 7;
  int32 primary_method_count = 8;
  repeated string methods = 9;
  string error = 100;
}

message AuthPolicyAuditOutput {
  bool passed = 1;
  repeated string violations = 2;
  string error = 100;
}

message AuthAdminConfig {
  string environment = 1;
  optional bool password_auth_enabled = 2;
  optional bool password_enabled = 3;
  optional bool totp_auth_enabled = 4;
  optional bool totp_enabled = 5;
  string webauthn_rp_id = 6;
  string webauthn_origin = 7;
  string smtp_host = 8;
  string smtp_from = 9;
  optional bool auth_routes_enabled = 10;
  optional bool routes_enabled = 11;
  optional bool oauth_routes_enabled = 12;
  string google_oauth_client_id = 13;
  string google_oauth_client_secret = 14;
  string google_oauth_redirect_url = 15;
  string oauth_provider = 16;
  optional bool sms_enabled = 17;
  string twilio_verify_service_sid = 18;
  string twilio_account_sid = 19;
  string twilio_auth_token = 20;
  string twilio_api_key_sid = 21;
  string twilio_api_key_secret = 22;
  string jwt_secret = 23;
  optional bool sms_auth_enabled = 24;
  string facebook_oauth_client_id = 25;
  string facebook_oauth_client_secret = 26;
  string facebook_oauth_redirect_url = 27;
  string instagram_oauth_client_id = 28;
  string instagram_oauth_client_secret = 29;
  string x_oauth_client_id = 30;
  string x_oauth_client_secret = 31;
  optional bool allow_insecure_test_oauth_endpoints = 32;
  repeated AuthProviderDescriptor providers = 33;
}

message AuthAdminDescribeInput {
  AuthAdminConfig config = 1;
  repeated AuthProviderDescriptor providers = 2;
}

message AuthAdminControlOption {
  string value = 1;
  string label = 2;
  string description = 3;
}

message AuthAdminControl {
  string key = 1;
  string group_key = 2;
  string label = 3;
  string description = 4;
  string help_text = 5;
  string input_type = 6;
  string config_key = 7;
  bool secret = 8;
  bool configured = 9;
  bool required = 10;
  bool enabled = 11;
  string disabled_reason = 12;
  repeated AuthAdminControlOption options = 13;
}

message AuthAdminControlGroup {
  string key = 1;
  string label = 2;
  string description = 3;
  repeated AuthAdminControl controls = 4;
}

message AuthAdminDiagnostic {
  string field = 1;
  string severity = 2;
  string message = 3;
}

message AuthAdminContributionConfig {
  string id = 1;
  string title = 2;
  string category = 3;
  string path = 4;
  string render_mode = 5;
  string app_context = 6;
  repeated AuthAdminContributionPermission permissions = 7;
  repeated string actions = 8;
  google.protobuf.Struct metadata = 9;
}

message AuthAdminContributionInput {
  AuthAdminContribution contribution = 1;
}

message AuthAdminContributionPermission {
  string resource = 1;
  string action = 2;
  string permission = 3;
}

message AuthAdminContribution {
  string id = 1;
  string title = 2;
  string category = 3;
  string path = 4;
  string render_mode = 5;
  string app_context = 6;
  repeated AuthAdminContributionPermission permissions = 7;
  repeated string actions = 8;
  google.protobuf.Struct metadata = 9;
}

message AuthAdminContributionOutput {
  AuthAdminContribution contribution = 1;
  string error = 100;
}

message AuthAdminDescribeOutput {
  repeated AuthAdminControlGroup groups = 1;
  google.protobuf.Struct effective_config = 2;
  google.protobuf.Struct methods_policy = 3;
  repeated AuthAdminDiagnostic warnings = 4;
  repeated string secret_fields = 5;
  string error = 100;
}

message AuthAdminValidateConfig {
  optional bool require_primary_method = 1;
}

message AuthAdminValidateInput {
  google.protobuf.Struct desired_config = 1;
  optional bool require_primary_method = 2;
  repeated AuthProviderDescriptor providers = 3;
}

message AuthAdminValidateOutput {
  optional bool valid = 1;
  google.protobuf.Struct accepted_config = 2;
  google.protobuf.Struct methods_policy = 3;
  repeated AuthAdminDiagnostic errors = 4;
  repeated AuthAdminDiagnostic warnings = 5;
  repeated string secret_fields = 6;
  string error = 100;
}

message OAuthProviderConfig {
  string provider = 1;
  string google_oauth_client_id = 2;
  string google_oauth_client_secret = 3;
  string google_oauth_redirect_url = 4;
  string google_oauth_authorization_url = 5;
  string google_oauth_token_url = 6;
  string google_oauth_userinfo_url = 7;
  repeated string google_oauth_scopes = 8;
  optional bool allow_insecure_test_oauth_endpoints = 9;
  optional bool pkce_required = 10;
  // return_to and access_token added in v0.2.4: BMW passes both via the
  // step's config: block (BMW templates `{{ .return_to }}` and
  // `{{ index .steps "exchange_code" "access_token" }}` respectively).
  // Under strict-proto these are validated at build-time when templates
  // are unresolved literals, so they must live on OAuthProviderConfig.
  // Handlers prefer config values when non-empty, then fall back to
  // OAuthProviderInput (runtime input).
  string return_to = 11;
  string access_token = 12;
}

message OAuthProviderInput {
  string provider = 1;
  string return_to = 2;
  string code = 3;
  string code_verifier = 4;
  string access_token = 5;
  optional bool pkce_required = 6;
}

message OAuthProviderConfigOutput {
  string provider = 1;
  bool available = 2;
  string disabled_reason = 3;
  string client_id = 4;
  string redirect_url = 5;
  string authorization_url = 6;
  string token_url = 7;
  string userinfo_url = 8;
  repeated string scopes = 9;
  string error = 100;
}

message OAuthStartOutput {
  bool started = 1;
  string provider = 2;
  string state = 3;
  string return_to = 4;
  string expires_at = 5;
  string redirect_url = 6;
  string authorization_url = 7;
  string code_verifier = 8;
  string code_challenge = 9;
  string code_challenge_method = 10;
  string error = 100;
}

message OAuthExchangeOutput {
  bool exchanged = 1;
  string provider = 2;
  google.protobuf.Struct raw_tokens = 3;
  string access_token = 4;
  string refresh_token = 5;
  string id_token = 6;
  string token_type = 7;
  string scope = 8;
  int32 expires_in = 9;
  string error = 100;
}

message OAuthUserinfoOutput {
  bool fetched = 1;
  string provider = 2;
  string provider_subject = 3;
  string provider_user = 4;
  string email = 5;
  bool email_verified = 6;
  string name = 7;
  string picture = 8;
  google.protobuf.Struct raw_claims = 9;
  string error = 100;
}

message AuthProviderConfigOption {
  string value = 1;
  string label = 2;
  string description = 3;
}

message AuthProviderConfigField {
  string key = 1;
  string label = 2;
  string description = 3;
  string help_text = 4;
  string input_type = 5;
  bool secret = 6;
  bool required = 7;
  repeated AuthProviderConfigOption options = 8;
  string lookup = 9;
  string validation_pattern = 10;
}

message AuthProviderCapability {
  string key = 1;
  string label = 2;
  string category = 3;
  string description = 4;
  bool supported = 5;
  string disabled_reason = 6;
  repeated string app_scopes = 7;
  repeated string admin_read_scopes = 8;
  repeated string admin_write_scopes = 9;
  repeated AuthProviderConfigField config_fields = 10;
}

message AuthProviderDescriptor {
  string id = 1;
  string label = 2;
  string description = 3;
  repeated string categories = 4;
  string implementation = 5;
  string version = 6;
  string docs_url = 7;
  string support_level = 8;
  string disabled_reason = 9;
  repeated AuthProviderCapability capabilities = 10;
}

message AuthProviderCatalogConfig {
  repeated AuthProviderDescriptor providers = 1;
}

message AuthProviderCatalogInput {
  repeated AuthProviderDescriptor providers = 1;
}

message AuthProviderCatalogOutput {
  repeated AuthProviderDescriptor providers = 1;
  repeated AuthAdminDiagnostic warnings = 2;
  string error = 100;
}

message CredentialListInput {
  string credentials_json = 1;
}

message CredentialSummary {
  string id = 1;
  string type = 2;
  string device_name = 3;
  string created_at = 4;
  string last_used = 5;
}

message CredentialListOutput {
  repeated CredentialSummary credentials = 1;
  int32 count = 2;
  string error = 100;
}

message CredentialRevokeInput {
  string credential_id = 1;
  string owner_user_id = 2;
  string user_id = 3;
}

message CredentialRevokeOutput {
  bool authorized = 1;
  string credential_id = 2;
  string error = 100;
}
